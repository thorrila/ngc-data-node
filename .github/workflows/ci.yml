name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: End-to-End Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: determinate-systems/nix-installer-action@v16

      - name: Magic Nix Cache
        uses: determinate-systems/magic-nix-cache-action@v8

      - name: Setup Database (Docker)
        run: |
          nix develop --command ngc db-up
          # Give Postgres a moment to stay ready
          sleep 5

      - name: Data Pipeline Verification (Generate -> Run)
        run: |
          nix develop --command ngc generate
          nix develop --command ngc run

      - name: Code Quality & Unit Tests (ngc polish)
        run: nix develop --command ngc polish

      - name: Verify Production Packaging (nix build)
        run: nix build

      - name: Provision Local Services (Ansible)
        run: nix develop --command ngc deploy
