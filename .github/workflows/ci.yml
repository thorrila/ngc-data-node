name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check Rust formatting
        run: nix develop --command bash -c "cd processor && cargo fmt --check"

      - name: Rust Lint (Clippy)
        run: nix develop --command bash -c "cd processor && cargo clippy -- -D warnings"

      - name: Run Rust tests
        run: nix develop --command bash -c "cd processor && cargo test"

      - name: Check Python formatting
        run: nix develop --command bash -c "cd enclave && uv run ruff format --check ."

      - name: Python Lint (Ruff)
        run: nix develop --command bash -c "cd enclave && uv run ruff check ."

      - name: Run Python tests
        run: nix develop --command bash -c "cd enclave && uv run pytest"
