name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # Rust Processor
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: processor

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            processor/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('processor/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint (Clippy)
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  # Python Enclave
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enclave

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Ruff)
        run: uv run ruff format --check .

      - name: Run tests
        # Exit code 5 = no tests collected (acceptable on infra-only branches)
        # The || pattern is safe under set -e: $? in the fallback holds pytest's exit code
        run: uv run pytest --tb=short || [ $? -eq 5 ]
