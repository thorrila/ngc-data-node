# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Files to skip globally (generated/lock files, virtual envs)
exclude: |
  (?x)^(
    uv\.lock|
    Cargo\.lock|
    \.venv/.*|
    processor/target/.*
  )$

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: [--branch, main]

  # Security — catches accidentally committed secrets, tokens, and credentials
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
    # Lint and autofix
      - id: ruff
        args: [--fix]
    # Format
      - id: ruff-format

  # Rust
  - repo: local
    hooks:
      # Format
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --manifest-path processor/Cargo.toml --
        language: system
        files: \.rs$
        pass_filenames: false
